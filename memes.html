<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爱播整活办 | 企业级 MEME 库</title>
  <style>
    :root { 
      --p: #00c9a7; 
      --bg: #050a0f; 
      --card-bg: #12181f;
    }
    
    body { background: var(--bg); color: #fff; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; padding: 0; }

    /* 顶部导航与操作栏 */
    .header-bar { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 20px 40px; background: rgba(18, 24, 31, 0.8); backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222;
    }
    .logo { font-size: 18px; font-weight: bold; letter-spacing: 1px; color: var(--p); }
    .upload-btn { 
      background: var(--p); color: #000; padding: 8px 20px; border-radius: 4px; 
      text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.3s;
      cursor: pointer; border: none;
    }
    .upload-btn:hover { opacity: 0.9; transform: translateY(-2px); }

    /* 6x6 企业级网格布局 */
    .grid-container {
      max-width: 1400px; margin: 40px auto; padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(6, 1fr); /* 核心：固定6列 */
      gap: 15px;
    }

    @media (max-width: 1100px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 700px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }

    /* 图片项样式 - 强制正方形 */
    .meme-card {
      position: relative; background: var(--card-bg); border-radius: 8px; overflow: hidden;
      aspect-ratio: 1 / 1; /* 保持正方形 */
      border: 1px solid #222;
      animation: zoomIn 0.5s ease-out backwards;
    }

    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .meme-card img {
      width: 100%; height: 100%; object-fit: cover; /* 关键：图片填充不留白 */
      transition: 0.5s cubic-bezier(0.33, 1, 0.68, 1);
      filter: brightness(0.9);
    }

    /* 悬停效果 */
    .meme-card:hover img { transform: scale(1.1); filter: brightness(1.1); }
    
    .meme-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: 0.3s;
    }
    .meme-card:hover .meme-overlay { opacity: 1; }
    
    .view-btn {
      border: 1px solid #fff; color: #fff; padding: 6px 15px; font-size: 12px;
      border-radius: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(5px);
    }

    /* 灯箱优化 */
    #lb { 
      position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
      display: none; align-items: center; justify-content: center; 
      z-index: 1000; cursor: zoom-out; opacity: 0; transition: 0.3s;
    }
    #lb.on { display: flex; opacity: 1; }
    #lb img { max-width: 90%; max-height: 90%; border-radius: 4px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }

    /* 隐藏文件上传控件 */
    #fileInput { display: none; }
  </style>
</head>
<body>

  <div class="header-bar">
    <div class="logo">AIBO_MEME_DATABASE</div>
    <div>
      <input type="file" id="fileInput" accept="image/*" onchange="handleUpload(this)">
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">上传新图片</button>
    </div>
  </div>

  <div class="grid-container" id="memeGrid">
    <!-- 初始图片示例 -->
    <div class="meme-card" onclick="openLb('./images3/anchor1.png')">
      <img src="./images3/anchor1.png">
      <div class="meme-overlay"><span class="view-btn">点击放大</span></div>
    </div>
    <!-- 复制上面的 div 来增加更多图片... -->
    <div class="meme-card" onclick="openLb('./images3/anchor2.png')">
      <img src="./images3/anchor2.png">
      <div class="meme-overlay"><span class="view-btn">点击放大</span></div>
    </div>
    <div class="meme-card" onclick="openLb('./images3/anchor3.png')">
      <img src="./images3/anchor3.png">
      <div class="meme-overlay"><span class="view-btn">点击放大</span></div>
    </div>
    <div class="meme-card" onclick="openLb('./images3/anchor4.png')">
      <img src="./images3/anchor4.png">
      <div class="meme-overlay"><span class="view-btn">点击放大</span></div>
    </div>
    <div class="meme-card" onclick="openLb('./images3/anchor5.png')">
      <img src="./images3/anchor5.png">
      <div class="meme-overlay"><span class="view-btn">点击放大</span></div>
    </div>
    <div class="meme-card" onclick="openLb('./images3/anchor6.png')">
      <img src="./images3/anchor6.png">
      <div class="meme-overlay"><span class="view-btn">点击放大</span></div>
    </div>
  </div>

  <div id="lb" onclick="closeLb()">
    <img id="lbImg" src="">
  </div>

  <script>
    function openLb(src) {
      const lb = document.getElementById('lb');
      document.getElementById('lbImg').src = src;
      lb.style.display = 'flex';
      setTimeout(() => lb.classList.add('on'), 10);
    }

    function closeLb() {
      const lb = document.getElementById('lb');
      lb.classList.remove('on');
      setTimeout(() => lb.style.display = 'none', 300);
    }

    // 模拟上传逻辑（仅当前页面有效）
    function handleUpload(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const grid = document.getElementById('memeGrid');
          const newCard = document.createElement('div');
          newCard.className = 'meme-card';
          newCard.onclick = () => openLb(e.target.result);
          newCard.innerHTML = `
            <img src="${e.target.result}">
            <div class="meme-overlay"><span class="view-btn">点击放大</span></div>
          `;
          grid.insertBefore(newCard, grid.firstChild); // 新上传的图放第一位
        };
        reader.readAsDataURL(input.files[0]);
      }
    }
  </script>

</body>
</html>
