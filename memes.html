<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爱播整活办 | AIBO MEME</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <style>
    :root { --p: #00c9a7; --bg: #050a0f; }
    body { background: var(--bg); color: #fff; font-family: "PingFang SC", sans-serif; margin: 0; padding: 20px; }
    
    .nav-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 30px; }
    .nav-header a { color: #fff; text-decoration: none; font-size: 14px; border: 1px solid #444; padding: 5px 15px; border-radius: 4px; }
    .nav-header a:hover { border-color: var(--p); color: var(--p); }

    h1 { text-align: center; font-size: 28px; letter-spacing: 4px; color: var(--p); margin-bottom: 5px; }
    p.sub { text-align: center; color: #666; font-size: 12px; margin-bottom: 40px; }

    .fan-list { 
      columns: 5; 
      column-gap: 12px; 
      max-width: 1200px; 
      margin: 0 auto; 
    }

    @media (max-width: 1000px) { .fan-list { columns: 4; } }
    @media (max-width: 700px) { .fan-list { columns: 3; } }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fan-item { 
      break-inside: avoid; 
      margin-bottom: 12px; 
      position: relative; 
      border: 1px solid #222; 
      overflow: hidden; 
      cursor: pointer; 
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeInUp 0.6s ease backwards;
    }

    .fan-item:nth-child(1) { animation-delay: 0.1s; }
    .fan-item:nth-child(2) { animation-delay: 0.15s; }
    .fan-item:nth-child(3) { animation-delay: 0.2s; }
    .fan-item:nth-child(4) { animation-delay: 0.25s; }
    .fan-item:nth-child(5) { animation-delay: 0.3s; }
    .fan-item:nth-child(n+6) { animation-delay: 0.35s; }

    .fan-item img { width: 100%; display: block; filter: grayscale(0.2); transition: 0.4s; }
    
    .fan-item:hover { 
      border-color: var(--p); 
      transform: scale(1.05); 
      z-index: 10;
      box-shadow: 0 10px 20px rgba(0,201,167,0.2); 
    }
    .fan-item:hover img { filter: grayscale(0); }

    .fan-over { 
      position: absolute; bottom: 0; left: 0; right: 0; 
      background: rgba(0, 201, 167, 0.9); color: #000; 
      padding: 4px; font-size: 10px; font-weight: bold;
      text-align: center; transform: translateY(100%); transition: 0.3s;
    }
    .fan-item:hover .fan-over { transform: translateY(0); }

    #lb { 
      position: fixed; inset: 0; 
      background: rgba(0,0,0,0.9); 
      display: none; 
      align-items: center; 
      justify-content: center; 
      z-index: 1000; 
      cursor: zoom-out;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #lb.on { display: flex; opacity: 1; }
    #lb img { 
      max-width: 85%; 
      max-height: 85%; 
      box-shadow: 0 0 50px rgba(0,0,0,1); 
      border: 1px solid #444;
      transform: scale(0.9);
      transition: transform 0.3s;
    }
    #lb.on img { transform: scale(1); }
  </style>
</head>
<body>

  <div class="nav-header">
    <div style="font-weight:bold">AIBO_DATABASE_EXE</div>
    <a href="index.html">← 返回主站</a>
  </div>

  <h1>爱播鬼畜表情</h1>
  <p class="sub">点击图片放大 (๑•̀ㅂ•́)و✧</p>

  <div class="fan-list">
    <div class="fan-item" onclick="openLb('./images3/anchor1.png')">
      <img src="./images3/anchor1.png" loading="lazy">
      <div class="fan-over">表情 · 01</div>
    </div>
    <div class="fan-item" onclick="openLb('./images3/anchor2.png')">
      <img src="./images3/anchor2.png" loading="lazy">
      <div class="fan-over">表情 · 02</div>
    </div>
    <div class="fan-item" onclick="openLb('./images3/anchor3.png')">
      <img src="./images3/anchor3.png" loading="lazy">
      <div class="fan-over">表情 · 03</div>
    </div>
    <div class="fan-item" onclick="openLb('./images3/anchor4.png')">
      <img src="./images3/anchor4.png" loading="lazy">
      <div class="fan-over">表情 · 04</div>
    </div>
    <div class="fan-item" onclick="openLb('./images3/anchor5.png')">
      <img src="./images3/anchor5.png" loading="lazy">
      <div class="fan-over">表情 · 05</div>
    </div>
    <div class="fan-item" onclick="openLb('./images3/anchor6.png')">
      <img src="./images3/anchor6.png" loading="lazy">
      <div class="fan-over">表情 · 06</div>
    </div>
    <div class="fan-item" onclick="openLb('./images3/gay1.png')">
      <img src="./images3/gay1.png" loading="lazy">
      <div class="fan-over">表情 · 07</div>
    </div>
    <div class="fan-item" onclick="openLb('./images3/gay2.png')">
      <img src="./images3/gay2.png" loading="lazy">
      <div class="fan-over">表情 · 08</div>
    </div>
    <div class="fan-item" onclick="openLb('./images3/gay3.png')">
      <img src="./images3/gay3.png" loading="lazy">
      <div class="fan-over">表情 · 09</div>
    </div>
    <div class="fan-item" onclick="openLb('./images3/gay4.png')">
      <img src="./images3/gay4.png" loading="lazy">
      <div class="fan-over">表情 · 10</div>
    </div>
  </div>

  <div id="lb" onclick="closeLb()">
    <img id="lbImg" src="">
  </div>

  <script>
    function openLb(src) {
      const lb = document.getElementById('lb');
      document.getElementById('lbImg').src = src;
      lb.style.display = 'flex';
      setTimeout(() => lb.classList.add('on'), 10);
    }
    function closeLb() {
      const lb = document.getElementById('lb');
      lb.classList.remove('on');
      setTimeout(() => lb.style.display = 'none', 300);
    }
  </script>

</body>
</html>
