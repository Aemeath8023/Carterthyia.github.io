<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>The Journey | 旅行日记</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+SC:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text-primary: #e8e4dc;
      --text-secondary: rgba(232,228,220,0.45);
      --accent: #7eb8c9;
      --accent-soft: rgba(126,184,201,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: "Noto Serif SC", serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Rain Canvas ── */
    #rain-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    /* ── Fog layers ── */
    .fog {
      position: fixed;
      top: 0; left: 0;
      width: 200%; height: 100%;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(ellipse 60% 50% at 20% 60%, rgba(40,65,90,0.18) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 40% at 80% 30%, rgba(20,40,65,0.14) 0%, transparent 70%);
      animation: fogDrift 28s ease-in-out infinite alternate;
    }
    @keyframes fogDrift {
      from { transform: translateX(0); }
      to   { transform: translateX(-15%); }
    }

    /* ── Sky Background ── */
    .sky {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(18,35,58,0.9) 0%, transparent 70%),
        linear-gradient(180deg, #060b12 0%, #0d1926 40%, #0a1520 100%);
    }
    /* Stars */
    .sky::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 38% 7%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 62% 12%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 5%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 25% 18%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 52% 20%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 15%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 22%, rgba(255,255,255,0.3) 0%, transparent 100%);
      animation: starTwinkle 6s ease-in-out infinite alternate;
    }
    @keyframes starTwinkle {
      from { opacity: 0.7; }
      to   { opacity: 1; }
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      padding: 120px 50px 80px;
      text-align: center;
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--accent), transparent);
      opacity: 0.5;
    }

    .header-eyebrow {
      font-family: "Cormorant Garamond", serif;
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--accent);
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 28px;
      animation: fadeUp 1.2s ease both;
    }

    .header h2 {
      font-family: "Cormorant Garamond", serif;
      font-weight: 300;
      font-size: clamp(42px, 7vw, 80px);
      letter-spacing: 0.18em;
      color: var(--text-primary);
      line-height: 1;
      animation: fadeUp 1.2s 0.15s ease both;
    }
    .header h2 em {
      font-style: italic;
      color: var(--accent);
    }

    .header-sub {
      margin-top: 22px;
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 4px;
      font-weight: 200;
      animation: fadeUp 1.2s 0.3s ease both;
    }

    /* Rain counter */
    .rain-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 36px;
      padding: 8px 18px;
      border: 1px solid var(--border);
      border-radius: 30px;
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 3px;
      background: var(--surface);
      animation: fadeUp 1.2s 0.45s ease both;
    }
    .rain-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.6); }
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Gallery ── */
    .gallery {
      max-width: 1300px;
      margin: 80px auto 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      padding: 0 40px 120px;
    }

    /* ── Photo Card ── */
    .photo-card {
      position: relative;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      overflow: hidden;
      transition: border-color 0.4s, transform 0.4s, box-shadow 0.4s;
      cursor: pointer;
      animation: fadeUp 1s ease both;
    }
    .photo-card:nth-child(1) { animation-delay: 0.5s; }
    .photo-card:nth-child(2) { animation-delay: 0.7s; }
    .photo-card:nth-child(3) { animation-delay: 0.9s; }
    .photo-card:nth-child(4) { animation-delay: 1.1s; }

    .photo-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-6px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(126,184,201,0.08);
    }

    /* Shimmer on hover */
    .photo-card::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(126,184,201,0.06), transparent);
      transition: left 0.7s ease;
      z-index: 3;
      pointer-events: none;
    }
    .photo-card:hover::before { left: 150%; }

    .photo-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      filter: brightness(0.75) saturate(0.8);
      transition: filter 0.5s, transform 0.5s;
    }
    .photo-card:hover img {
      filter: brightness(0.85) saturate(1);
      transform: scale(1.03);
    }

    /* Wet glass overlay on image */
    .photo-card .glass-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 280px;
      background: linear-gradient(180deg, transparent 60%, rgba(6,11,18,0.7) 100%);
      z-index: 1;
    }

    /* Rain streaks on card */
    .photo-card .card-rain {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 280px;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    .card-rain span {
      position: absolute;
      top: -20px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(126,184,201,0.25), transparent);
      border-radius: 1px;
      animation: cardRainFall linear infinite;
    }
    @keyframes cardRainFall {
      from { transform: translateY(-20px); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      to   { transform: translateY(300px); opacity: 0; }
    }

    .photo-info {
      padding: 22px 24px;
      position: relative;
    }
    .photo-info h4 {
      font-family: "Noto Serif SC", serif;
      font-size: 16px;
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: 2px;
    }
    .photo-info .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .photo-info span {
      font-family: "Cormorant Garamond", serif;
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 2px;
    }
    .photo-info .dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
    }

    /* ── Divider line ── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 40px;
    }
    .section-divider span {
      font-family: "Cormorant Garamond", serif;
      font-size: 10px;
      color: var(--text-secondary);
      letter-spacing: 4px;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Back button ── */
    .back {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 48px;
      height: 48px;
      border: 1px solid var(--border-hover);
      background: var(--surface);
      backdrop-filter: blur(12px);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      text-decoration: none;
      font-size: 16px;
      transition: background 0.3s, border-color 0.3s, transform 0.3s;
      z-index: 100;
    }
    .back:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    /* Raindrops on back button */
    .back::after {
      display: none;
    }

    /* ── Water ripple on page ── */
    .ripple-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(126,184,201,0.15);
      transform: scale(0);
      animation: rippleAnim 2.5s linear forwards;
    }
    @keyframes rippleAnim {
      0%   { transform: scale(0); opacity: 0.6; }
      100% { transform: scale(4); opacity: 0; }
    }

    /* ── Puddle reflection text ── */
    .reflection-bar {
      text-align: center;
      padding: 20px;
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 13px;
      color: var(--text-secondary);
      letter-spacing: 3px;
      transform: scaleY(-0.4);
      opacity: 0.3;
      filter: blur(1.5px);
      user-select: none;
      margin-top: -10px;
    }
  </style>
</head>
<body>

  <canvas id="rain-canvas"></canvas>
  <div class="fog"></div>
  <div class="sky"></div>
  <div class="ripple-container" id="rippleContainer"></div>

  <div class="page">
    <div class="header">
      <div class="header-eyebrow">Travel Diary</div>
      <h2>THE <em>JOURNEY</em></h2>
      <p class="header-sub">步履不停 · 记录走过的每一寸土地</p>
      <div class="rain-badge">
        <div class="rain-dot"></div>
        <span>雨中旅行</span>
      </div>
    </div>

    <div class="section-divider">
      <span>Memories</span>
    </div>

    <div class="gallery">
      <div class="photo-card">
        <img src="images/malaysia.jpg" alt="马来西亚">
        <div class="glass-overlay"></div>
        <div class="card-rain" id="rain1"></div>
        <div class="photo-info">
          <h4>吉隆坡 · 热带风情</h4>
          <div class="meta">
            <span>Apr 2024</span>
            <div class="dot"></div>
            <span>Malaysia</span>
          </div>
        </div>
      </div>
      <div class="photo-card">
        <img src="images/singapore.jpg" alt="新加坡">
        <div class="glass-overlay"></div>
        <div class="card-rain" id="rain2"></div>
        <div class="photo-info">
          <h4>新加坡 · 热带都市</h4>
          <div class="meta">
            <span>Dec 2023</span>
            <div class="dot"></div>
            <span>Singapore</span>
          </div>
        </div>
      </div>
    </div>

    <div class="reflection-bar">THE JOURNEY</div>
  </div>

  <a href="index.html" class="back">←</a>

  <script>
    // ── Full-page Rain ──
    const canvas = document.getElementById('rain-canvas');
    const ctx = canvas.getContext('2d');
    let drops = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); initDrops(); });

    function initDrops() {
      drops = [];
      const count = Math.floor(canvas.width / 3);
      for (let i = 0; i < count; i++) {
        drops.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          len: Math.random() * 18 + 8,
          speed: Math.random() * 4 + 6,
          opacity: Math.random() * 0.4 + 0.1,
          width: Math.random() < 0.3 ? 1.5 : 0.8,
        });
      }
    }
    initDrops();

    function drawRain() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drops.forEach(d => {
        const grad = ctx.createLinearGradient(d.x, d.y, d.x + d.len * 0.18, d.y + d.len);
        grad.addColorStop(0, `rgba(140,200,220,0)`);
        grad.addColorStop(0.4, `rgba(160,215,235,${d.opacity})`);
        grad.addColorStop(1, `rgba(140,200,220,0)`);
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x + d.len * 0.18, d.y + d.len);
        ctx.strokeStyle = grad;
        ctx.lineWidth = d.width;
        ctx.stroke();

        d.x += d.speed * 0.18;
        d.y += d.speed;
        if (d.y > canvas.height) {
          d.y = -d.len;
          d.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(drawRain);
    }
    drawRain();

    // ── Card micro-rain ──
    function createCardRain(containerId, count = 12) {
      const container = document.getElementById(containerId);
      if (!container) return;
      for (let i = 0; i < count; i++) {
        const s = document.createElement('span');
        const left = Math.random() * 100;
        const height = Math.random() * 40 + 20;
        const duration = Math.random() * 1.2 + 0.8;
        const delay = Math.random() * 3;
        s.style.cssText = `
          left: ${left}%;
          height: ${height}px;
          animation-duration: ${duration}s;
          animation-delay: ${delay}s;
        `;
        container.appendChild(s);
      }
    }
    createCardRain('rain1');
    createCardRain('rain2');

    // ── Water Ripples on click ──
    const rippleContainer = document.getElementById('rippleContainer');
    function spawnRipple(x, y) {
      const r = document.createElement('div');
      r.className = 'ripple';
      const size = Math.random() * 40 + 20;
      r.style.cssText = `
        left: ${x - size/2}px;
        top:  ${y - size/2}px;
        width: ${size}px;
        height: ${size}px;
      `;
      rippleContainer.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    }

    document.addEventListener('click', e => spawnRipple(e.clientX, e.clientY));

    // Random auto-ripples (like rain hitting ground)
    function autoRipple() {
      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;
      spawnRipple(x, y);
      setTimeout(autoRipple, Math.random() * 800 + 400);
    }
    setTimeout(autoRipple, 1000);
  </script>
</body>
</html>
