<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>香港站 · 霓虹纪实 | 星光小站</title>
  <link rel="icon" href="favicon/13.ico?v=20240626" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+SC:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  
  <style>
    :root {
      --hk-red: #ff3131;
      --hk-gold: #ffcc33;
      --hk-teal: #00ffd0;
      --glass: rgba(0, 0, 0, 0.65);
      --bdr: rgba(255, 255, 255, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #050a0f;
      color: #fff;
      font-family: 'Noto Sans SC', sans-serif;
      overflow-x: hidden;
    }

    /* --- 特效背景层 --- */
    .hk-bg {
      position: fixed;
      inset: 0;
      /* 这里先放一张占位图，你可以换成香港夜景图 */
      background: linear-gradient(to bottom, rgba(5,10,15,0.4), #050a0f), 
                  url('https://images.unsplash.com/photo-1506354666786-959d6d497f1a?q=80&w=2070&auto=format&fit=crop'); 
      background-size: cover;
      background-position: center;
      z-index: -2;
      filter: saturate(1.2) contrast(1.1);
    }

    /* 扫描线特效 */
    .scanlines {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 50%);
      background-size: 100% 4px;
      z-index: -1;
      pointer-events: none;
    }

    /* --- 导航栏 (复刻了主题样式) --- */
    .nav-simple {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--bdr);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--hk-gold); letter-spacing: 2px; }
    .back-home { color: #fff; text-decoration: none; font-size: 0.9rem; border: 1px solid #fff; padding: 5px 15px; border-radius: 50px; transition: 0.3s; }
    .back-home:hover { background: #fff; color: #000; }

    /* --- 主体内容 --- */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    /* 标题特效 */
    .hero-title {
      text-align: center;
      margin-bottom: 60px;
    }
    .hero-title h1 {
      font-family: 'Cinzel', serif;
      font-size: 5rem;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 0 10px var(--hk-red), 0 0 20px var(--hk-red);
      animation: flicker 3s infinite;
    }
    .hero-title p {
      font-size: 1.2rem;
      letter-spacing: 10px;
      color: var(--hk-teal);
      margin-top: -10px;
    }

    /* 占位框架卡片 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }

    .placeholder-card {
      background: var(--glass);
      border: 1px solid var(--bdr);
      height: 400px;
      border-radius: 4px; /* 港风更适合硬朗一点的小圆角 */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(15px);
      transition: 0.4s;
      position: relative;
      overflow: hidden;
    }

    .placeholder-card::before {
      content: "PREVIEW";
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.2);
      position: absolute;
      top: 10px;
      left: 10px;
    }

    .placeholder-card:hover {
      border-color: var(--hk-teal);
      transform: scale(1.02);
      box-shadow: 0 0 30px rgba(0, 255, 208, 0.2);
    }

    .icon-box {
      font-size: 3rem;
      color: var(--hk-gold);
      margin-bottom: 20px;
      opacity: 0.6;
    }

    .placeholder-card h3 {
      font-weight: 300;
      letter-spacing: 4px;
      color: #ccc;
    }

    /* 霓虹闪烁动画 */
    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { text-shadow: 0 0 10px var(--hk-red), 0 0 20px var(--hk-red); opacity: 1; }
      20%, 24%, 55% { text-shadow: none; opacity: 0.8; }
    }

    @media (max-width: 768px) {
      .hero-title h1 { font-size: 3rem; }
    }
  </style>
</head>
<body>

  <div class="hk-bg"></div>
  <div class="scanlines"></div>

  <nav class="nav-simple">
    <div class="logo">HONG KONG · LOG</div>
    <a href="index.html" class="back-home"><i class="fa fa-angle-left"></i> 返回主站</a>
  </nav>

  <div class="container">
    <header class="hero-title">
      <h1>香港</h1>
      <p>NEON DREAMS</p>
    </header>

    <div class="grid">
      <div class="placeholder-card">
        <div class="icon-box"><i class="fa fa-video-camera"></i></div>
        <h3>城市 VLOG 待嵌入</h3>
      </div>

      <div class="placeholder-card">
        <div class="icon-box"><i class="fa fa-camera-retro"></i></div>
        <h3>街头纪实 待嵌入</h3>
      </div>

      <div class="placeholder-card">
        <div class="icon-box"><i class="fa fa-cutlery"></i></div>
        <h3>港味足迹 待嵌入</h3>
      </div>
    </div>
  </div>

</body>
</html>
